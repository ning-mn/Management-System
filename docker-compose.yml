version: '3.8'

services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.0
    container_name: meeting-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: meeting_room_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meeting-network

  # ===== 后端服务 (Spring Boot) =====
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: meeting-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      # 可通过环境变量覆盖数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meeting_room_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
    ports:
      - "8080:8080"
    networks:
      - meeting-network

  # ===== 前端服务 (Nginx) =====
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: meeting-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - meeting-network

volumes:
  mysql-data:
    driver: local

networks:
  meeting-network:
    driver: bridge